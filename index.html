<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>우리 아기 임신 여정 🤍</title>
<style>
  :root {
    --bg: #FDF8F5;
    --card: #FFFFFF;
    --primary: #E8927C;
    --primary-soft: #FBEAE4;
    --accent: #7CA98E;
    --accent-soft: #E9F2EC;
    --text: #3D3733;
    --text-sub: #8A817B;
    --border: #F0E6E0;
    --warn: #C0564A;
    --warn-soft: #FAE9E7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Apple SD Gothic Neo", "Pretendard", -apple-system, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.65;
    padding-bottom: 80px;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 20px 16px; }

  /* Header */
  header {
    background: linear-gradient(135deg, #F5C4B4 0%, #E8927C 100%);
    color: #fff; padding: 28px 20px 24px; border-radius: 0 0 24px 24px;
  }
  header .inner { max-width: 720px; margin: 0 auto; }
  header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  header .sub { font-size: 13px; opacity: .9; }
  .hero {
    display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap;
  }
  .stat {
    flex: 1; min-width: 130px; background: rgba(255,255,255,.22);
    border-radius: 16px; padding: 14px 16px; backdrop-filter: blur(4px);
  }
  .stat .label { font-size: 12px; opacity: .9; }
  .stat .value { font-size: 22px; font-weight: 800; margin-top: 2px; }
  .stat .extra { font-size: 12px; opacity: .85; margin-top: 2px; }
  .progress-wrap { margin-top: 16px; }
  .progress-bar {
    height: 10px; background: rgba(255,255,255,.3); border-radius: 999px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: #fff; border-radius: 999px; transition: width .6s ease; }
  .progress-text { font-size: 12px; margin-top: 6px; opacity: .95; display: flex; justify-content: space-between; }

  /* Tabs */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0; background: var(--card);
    border-top: 1px solid var(--border); display: flex; z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav button {
    flex: 1; padding: 10px 4px 12px; border: none; background: none; cursor: pointer;
    font-size: 11px; color: var(--text-sub); font-family: inherit;
  }
  nav button .icon { display: block; font-size: 20px; margin-bottom: 2px; }
  nav button.active { color: var(--primary); font-weight: 700; }

  /* Cards */
  .card {
    background: var(--card); border-radius: 18px; padding: 20px;
    margin-bottom: 14px; border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(120, 80, 60, .04);
  }
  .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .card h3 { font-size: 14px; font-weight: 700; margin: 14px 0 6px; color: var(--primary); }
  .card p, .card li { font-size: 14px; color: var(--text); }
  .card ul { padding-left: 18px; }
  .card li { margin-bottom: 5px; }
  .badge {
    display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 999px; background: var(--primary-soft); color: var(--primary);
  }
  .badge.green { background: var(--accent-soft); color: var(--accent); }
  .badge.red { background: var(--warn-soft); color: var(--warn); }
  .notice {
    background: var(--warn-soft); border-radius: 12px; padding: 12px 14px;
    font-size: 13px; color: var(--warn); margin-top: 12px;
  }
  .tip {
    background: var(--accent-soft); border-radius: 12px; padding: 12px 14px;
    font-size: 13px; color: #4A6B58; margin-top: 12px;
  }

  /* Week navigator */
  .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .week-nav button {
    width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--card); font-size: 18px; cursor: pointer; color: var(--text);
  }
  .week-nav button:disabled { opacity: .3; cursor: default; }
  .week-nav .title { font-size: 18px; font-weight: 800; }
  .week-nav .title small { display: block; font-size: 12px; font-weight: 400; color: var(--text-sub); text-align: center; }
  .current-week-btn {
    display: block; margin: 0 auto 14px; padding: 6px 16px; border-radius: 999px;
    border: 1px solid var(--primary); background: var(--primary-soft); color: var(--primary);
    font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
  }

  /* Schedule table */
  .schedule-item {
    display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .schedule-item:last-child { border-bottom: none; }
  .schedule-item .when { min-width: 92px; }
  .schedule-item .when .weeks { font-size: 13px; font-weight: 700; color: var(--primary); }
  .schedule-item .when .dates { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
  .schedule-item .what .name { font-size: 14px; font-weight: 700; }
  .schedule-item .what .desc { font-size: 12.5px; color: var(--text-sub); margin-top: 2px; }
  .schedule-item.done { opacity: .45; }
  .schedule-item.now { background: var(--primary-soft); border-radius: 12px; padding: 14px 12px; margin: 0 -12px; }

  /* Checklist */
  .check-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item input { margin-top: 4px; width: 17px; height: 17px; accent-color: var(--primary); flex-shrink: 0; }
  .check-item .txt { font-size: 14px; }
  .check-item .txt small { display: block; font-size: 12px; color: var(--text-sub); }
  .check-item.checked .txt { text-decoration: line-through; color: var(--text-sub); }

  /* Food grid */
  .food-cols { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 560px) { .food-cols { grid-template-columns: 1fr 1fr; } }

  /* Settings */
  .settings-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .settings-row label { font-size: 13px; font-weight: 700; }
  .settings-row input, .settings-row select {
    padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
    font-size: 14px; font-family: inherit; background: #fff; color: var(--text);
  }
  .btn-primary {
    width: 100%; padding: 13px; border-radius: 12px; border: none;
    background: var(--primary); color: #fff; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .disclaimer { font-size: 11.5px; color: var(--text-sub); text-align: center; margin-top: 20px; padding: 0 10px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .supp-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .supp-item:last-child { border-bottom: none; }
  .supp-item .name { font-weight: 700; font-size: 14px; }
  .supp-item .period { font-size: 12px; color: var(--primary); font-weight: 700; }
  .supp-item .desc { font-size: 13px; color: var(--text-sub); margin-top: 2px; }
</style>
</head>

/* ================= 설정 & 주차 계산 ================= */
const DEFAULTS = { transferDate: '', embryoDay: 5 };
function loadSettings() {
  try { return { ...DEFAULTS, ...JSON.parse(localStorage.getItem('pt-settings') || '{}') }; }
  catch { return { ...DEFAULTS }; }
}
let settings = loadSettings();

function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function fmtDate(d) { return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
function fmtShort(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }

function calc() {
  const transfer = parseDate(settings.transferDate);
  const today = new Date(); today.setHours(0,0,0,0);
  // 시험관: 배아 이식일의 임신 나이 = 14일 + 배양일수
  const gaDays = Math.floor((today - transfer) / 86400000) + 14 + Number(settings.embryoDay);
  const dueDate = addDays(transfer, 266 - Number(settings.embryoDay)); // GA 280일 시점
  const week = Math.floor(gaDays / 7);
  const day = gaDays % 7;
  const ddayNum = Math.ceil((dueDate - today) / 86400000);
  return { gaDays, week, day, dueDate, ddayNum, today, transfer };
}
// 특정 주차의 시작 날짜 (GA week*7일 시점)
function weekStartDate(w) {
  const transfer = parseDate(settings.transferDate);
  return addDays(transfer, w*7 - (14 + Number(settings.embryoDay)));
}

</div>`;
function goSettings() { document.querySelector('nav button[data-tab=settings]').click(); }

function renderHeader() {
  if (!hasDate()) {
    $('header-sub').textContent = '설정에서 배아 이식일을 입력해주세요';
    $('stat-week').textContent = '-'; $('stat-dday').textContent = '-'; $('stat-size').textContent = '🌱';
    $('stat-week-extra').textContent = ''; $('stat-due').textContent = ''; $('stat-size-extra').textContent = '';
    $('progress-fill').style.width = '0%'; $('progress-pct').textContent = ''; $('progress-tri').textContent = '';
    return;
  }
  const c = calc();
  $('header-sub').textContent = `이식일 ${fmtDate(c.transfer)} (${settings.embryoDay}일 배양) 기준`;
  if (c.gaDays < 0) {
    $('stat-week').textContent = '-'; return;
  }
  $('stat-week').textContent = `${c.week}주 ${c.day}일`;
  const tri = c.week < 14 ? '1분기 (초기)' : c.week < 28 ? '2분기 (중기)' : '3분기 (후기)';
  $('stat-week-extra').textContent = tri;
  $('stat-dday').textContent = c.ddayNum > 0 ? `D-${c.ddayNum}` : c.ddayNum === 0 ? 'D-DAY!' : `D+${-c.ddayNum}`;
  $('stat-due').textContent = fmtDate(c.dueDate);
  const sz = SIZES[Math.min(Math.max(c.week,4),42)];
  if (sz && c.week >= 4) { $('stat-size').textContent = sz[0]; $('stat-size-extra').textContent = sz[1]; }
  else { $('stat-size').textContent = '🌱'; $('stat-size-extra').textContent = '착상 중'; }
  const pct = Math.min(100, Math.max(0, (c.gaDays / 280) * 100));
  $('progress-fill').style.width = pct + '%';
  $('progress-pct').textContent = `${pct.toFixed(1)}% 진행`;
  $('progress-tri').textContent = `출산까지 ${Math.max(0,c.ddayNum)}일`;
}

function weekCard(w, isCurrent) {
  const d = WEEKS[w]; if (!d) return '';
  const sz = SIZES[w];
  return `
    ${isCurrent ? '<span class="badge">📍 현재 주차</span>' : ''}
    <div class="card">
      <h2>👶 아기는 지금 ${sz ? `<span class="badge green">${sz[0]} 크기 · ${sz[1]}</span>` : ''}</h2>
      <p>${d.baby}</p>
      <h3>🤰 엄마의 몸</h3>
      <p>${d.mom}</p>
      <h3>✅ 이번 주 할 일</h3>
      <ul>${d.todo.map(t=>`<li>${t}</li>`).join('')}</ul>
      ${d.caution ? `<div class="notice">⚠️ ${d.caution}</div>` : ''}
    </div>`;
}

function renderWeekTab() {
  if (!hasDate()) { $('week-title').textContent = ''; $('week-detail').innerHTML = SETUP_CARD; return; }
  const c = calc();
  const cur = Math.min(Math.max(c.week, 4), 42);
  if (viewWeek === null) viewWeek = cur;
  const start = weekStartDate(viewWeek), end = addDays(start, 6);
  $('week-title').innerHTML = `임신 ${viewWeek}주차<small>${fmtShort(start)} ~ ${fmtShort(end)}</small>`;
  $('week-prev').disabled = viewWeek <= 4;
  $('week-next').disabled = viewWeek >= 42;
  $('week-detail').innerHTML = weekCard(viewWeek, viewWeek === cur);
}
function navWeek(dir) { viewWeek = Math.min(42, Math.max(4, viewWeek + dir)); renderWeekTab(); }
function goCurrentWeek() { const c = calc(); viewWeek = Math.min(Math.max(c.week,4),42); renderWeekTab(); }

function renderHome() {
  if (!hasDate()) { $('tab-home').innerHTML = SETUP_CARD; return; }
  const c = calc();
  const w = Math.min(Math.max(c.week, 4), 42);
  const upcoming = CHECKUPS.filter(x => x.e >= c.week).slice(0, 3);
  let html = '';
  if (c.week <= 12) {
    html += `<div class="card" style="border-left:4px solid var(--primary)">
      <h2>💊 시험관 초기 — 오늘의 핵심</h2>
      <p><b>프로게스테론(질정/주사)을 병원 지시대로 꼭 챙기세요.</b> 시험관 임신 초기에는 황체 호르몬 보충이 유산 방지에 매우 중요해요. 알람을 맞춰두는 걸 추천합니다.</p>
      <div class="tip">💡 엽산도 매일 함께! 초기 12주는 태아 신경관 형성의 골든타임입니다.</div>
    </div>`;
  }
  html += weekCard(w, true);
  html += `<div class="card"><h2>🗓️ 다가오는 검사</h2>` +
    upcoming.map(x => {
      const sd = weekStartDate(x.s), ed = addDays(weekStartDate(x.e), 6);
      const now = c.week >= x.s && c.week <= x.e;
      return `<div class="schedule-item ${now?'now':''}">
        <div class="when"><div class="weeks">${x.s===x.e? x.s+'주' : x.s+'~'+x.e+'주'}</div>
        <div class="dates">${fmtShort(sd)}~${fmtShort(ed)}</div></div>
        <div class="what"><div class="name">${x.name}${now?' <span class="badge">지금!</span>':''}</div><div class="desc">${x.desc}</div></div>
      </div>`;
    }).join('') + `</div>`;
  $('tab-home').innerHTML = html;
}

/* ================= 캘린더(.ics) 내보내기 ================= */
function icsDate(d) {
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function buildICS() {
  const c = calc();
  const lines = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//pregnancy-tracker//KR','CALSCALE:GREGORIAN',
    'X-WR-CALNAME:임신 검사 일정 👶'
  ];
  const esc = s => s.replace(/([,;])/g,'\\$1');
  // 검사 일정 — 각 검사 시작일에 종일 이벤트 + 하루 전 알림
  CHECKUPS.forEach((x,i) => {
    const sd = weekStartDate(x.s);
    if (sd < c.today && c.week > x.e) return; // 이미 지난 검사는 제외
    const range = x.s===x.e ? `${x.s}주` : `${x.s}~${x.e}주`;
    lines.push('BEGIN:VEVENT',
      `UID:pt-checkup-${i}-${icsDate(sd)}@pregnancy-tracker`,
      `DTSTART;VALUE=DATE:${icsDate(sd)}`,
      `DTEND;VALUE=DATE:${icsDate(addDays(sd,1))}`,
      `SUMMARY:🏥 ${esc(x.name)} (${range})`,
      `DESCRIPTION:${esc(x.desc)}`,
      'BEGIN:VALARM','ACTION:DISPLAY','TRIGGER:-P1D',`DESCRIPTION:${esc(x.name)} 시기예요`,'END:VALARM',
      'END:VEVENT');
  });
  // 매주 주차 바뀌는 날 알림 (앱에서 새 주차 가이드 확인 유도)
  const firstWeekDay = weekStartDate(Math.max(c.week+1, 5));
  lines.push('BEGIN:VEVENT',
    `UID:pt-weekly-${icsDate(firstWeekDay)}@pregnancy-tracker`,
    `DTSTART;VALUE=DATE:${icsDate(firstWeekDay)}`,
    `DTEND;VALUE=DATE:${icsDate(addDays(firstWeekDay,1))}`,
    `RRULE:FREQ=WEEKLY;UNTIL=${icsDate(c.dueDate)}T000000Z`,
    'SUMMARY:🤍 임신 주차가 올라갔어요 — 이번 주 가이드 확인!',
    'DESCRIPTION:앱에서 새 주차의 아기 발달·할 일·주의사항을 확인해보세요',
    'END:VEVENT');
  // 프로게스테론 매일 알림 (12주까지, 시험관 필수)
  const twelveWeeks = weekStartDate(12);
  if (c.today < twelveWeeks) {
    lines.push('BEGIN:VEVENT',
      `UID:pt-prog-${icsDate(c.today)}@pregnancy-tracker`,
      `DTSTART;VALUE=DATE:${icsDate(addDays(c.today,1))}`,
      `DTEND;VALUE=DATE:${icsDate(addDays(c.today,2))}`,
      `RRULE:FREQ=DAILY;UNTIL=${icsDate(twelveWeeks)}T000000Z`,
      'SUMMARY:💊 프로게스테론 + 엽산 챙기기',
      'DESCRIPTION:시험관 초기 필수! 병원 지시 용법대로. 중단 시점은 담당의와 상의 (보통 8~12주)',
      'END:VEVENT');
  }
  // 출산예정일
  lines.push('BEGIN:VEVENT',
    `UID:pt-due-${icsDate(c.dueDate)}@pregnancy-tracker`,
    `DTSTART;VALUE=DATE:${icsDate(c.dueDate)}`,
    `DTEND;VALUE=DATE:${icsDate(addDays(c.dueDate,1))}`,
    'SUMMARY:👶 출산 예정일!',
    'END:VEVENT','END:VCALENDAR');
  return lines.join('\r\n');
}
function downloadICS() {
  const blob = new Blob([buildICS()], {type:'text/calendar;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '임신검사일정.ics';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

function renderSchedule() {
  if (!hasDate()) { $('tab-schedule').innerHTML = SETUP_CARD; return; }
  const c = calc();
  $('tab-schedule').innerHTML = `
  <div class="card">
    <h2>📲 아이폰/구글 캘린더로 알림 받기</h2>
    <p style="font-size:13px;color:var(--text-sub);margin-bottom:12px">아래 버튼으로 캘린더 파일을 받아 열면, 남은 검사 일정(하루 전 알림 포함) + 매일 프로게스테론 알림(12주까지) + 매주 주차 알림이 폰 캘린더에 등록돼요. 부부 공유 캘린더에 넣으면 둘 다 알림을 받습니다.</p>
    <button class="btn-primary" onclick="downloadICS()">🗓️ 캘린더 파일(.ics) 내려받기</button>
    <div class="tip">💡 아이폰: 파일을 받은 뒤 열기 → "모두 추가". 구글 캘린더: 설정 → 가져오기에서 파일 선택.</div>
  </div>
  <div class="card"><h2>🗓️ 전체 검사 일정 <span class="badge green">날짜 자동 계산</span></h2>` +
    CHECKUPS.map(x => {
      const sd = weekStartDate(x.s), ed = addDays(weekStartDate(x.e), 6);
      const done = c.week > x.e, now = c.week >= x.s && c.week <= x.e;
      return `<div class="schedule-item ${done?'done':''} ${now?'now':''}">
        <div class="when"><div class="weeks">${x.s===x.e? x.s+'주' : x.s+'~'+x.e+'주'}</div>
        <div class="dates">${fmtShort(sd)} ~ ${fmtShort(ed)}</div></div>
        <div class="what"><div class="name">${done?'✓ ':''}${x.name}${now?' <span class="badge">지금!</span>':''}</div><div class="desc">${x.desc}</div></div>
      </div>`;
    }).join('') + `<div class="tip">💡 검진 기본 주기: ~27주 4주 1회 → 28~35주 2주 1회 → 36주~ 매주 1회. 시험관·고위험 임신은 병원 방침에 따라 더 자주일 수 있어요.</div></div>`;
}

function renderNutrition() {
  $('tab-nutrition').innerHTML = `
    <div class="card"><h2>💊 영양제 로드맵</h2>` +
    SUPPLEMENTS.map(s=>`<div class="supp-item"><div class="name">${s.name}</div><div class="period">${s.period}</div><div class="desc">${s.desc}</div></div>`).join('') +
    `<div class="tip">💡 종합 임산부 비타민 하나로 대체해도 좋아요. 다만 <b>엽산 함량</b>과 <b>비타민A 과다(레티놀 형태 주의)</b> 여부를 확인하세요.</div></div>
    <div class="food-cols">
      <div class="card"><h2>🥗 챙겨 먹으면 좋아요</h2><ul>` +
      FOODS_GOOD.map(f=>`<li><b>${f[0]}</b><br><span style="font-size:12.5px;color:var(--text-sub)">${f[1]}</span></li>`).join('') +
      `</ul></div>
      <div class="card"><h2>🚫 피해야 해요</h2><ul>` +
      FOODS_AVOID.map(f=>`<li><b>${f[0]}</b><br><span style="font-size:12.5px;color:var(--text-sub)">${f[1]}</span></li>`).join('') +
      `</ul></div>
    </div>
    <div class="card"><h2>🏃 운동 & 생활</h2><ul>
      <li><b>걷기</b> — 전 기간 최고의 운동. 하루 30분 목표</li>
      <li><b>임산부 요가·수영</b> — 2분기부터 추천</li>
      <li><b>케겔 운동</b> — 분만·산후 회복에 도움</li>
      <li><b>수면</b> — 2분기부터 왼쪽으로 눕기, 바디필로우 활용</li>
      <li><b>피할 것</b> — 넘어질 위험 있는 운동, 복부 압박 자세, 사우나·찜질방(특히 초기)</li>
    </ul><div class="notice">⚠️ 시험관 임신 초기(심박 확인 전후)에는 운동 강도를 담당의와 먼저 상의하세요. 가벼운 산책 수준이 안전합니다.</div></div>`;
}

function loadChecks() { try { return JSON.parse(localStorage.getItem('pt-checks')||'{}'); } catch { return {}; } }
function renderChecklist() {
  const checks = loadChecks();
  let idx = 0;
  $('tab-checklist').innerHTML = CHECKLIST.map(g => {
    const items = g.items.map(it => {
      const id = 'chk' + (idx++);
      const on = !!checks[id];
      return `<label class="check-item ${on?'checked':''}" data-id="${id}">
        <input type="checkbox" ${on?'checked':''}>
        <span class="txt">${it[0]}${it[1]?`<small>${it[1]}</small>`:''}</span></label>`;
    }).join('');
    return `<div class="card"><h2>${g.group}</h2>${items}</div>`;
  }).join('');
  document.querySelectorAll('.check-item input').forEach(inp => {
    inp.addEventListener('change', e => {
      const label = e.target.closest('.check-item');
      const checks = loadChecks();
      checks[label.dataset.id] = e.target.checked;
      try { localStorage.setItem('pt-checks', JSON.stringify(checks)); } catch {}
      label.classList.toggle('checked', e.target.checked);
    });
  });
}

function renderSettings() {
  $('tab-settings').innerHTML = `<div class="card"><h2>⚙️ 설정</h2>
    <div class="settings-row"><label>배아 이식일</label>
      <input type="date" id="set-date" value="${settings.transferDate}"></div>
    <div class="settings-row"><label>배아 배양 일수</label>
      <select id="set-embryo">
        <option value="5" ${settings.embryoDay==5?'selected':''}>5일 배양 (배반포) — 가장 흔함</option>
        <option value="3" ${settings.embryoDay==3?'selected':''}>3일 배양</option>
        <option value="6" ${settings.embryoDay==6?'selected':''}>6일 배양</option>
      </select></div>
    <button class="btn-primary" onclick="saveSettings()">저장</button>
    <div class="tip">💡 시험관 임신 주차 계산: 이식일에 이미 <b>임신 2주 + 배양일수</b>가 지난 것으로 계산합니다. 병원에서 알려준 출산예정일과 다르면 병원 날짜가 우선이에요.</div>
  </div>`;
}
function saveSettings() {
  if (!$('set-date').value) { alert('배아 이식일을 입력해주세요!'); return; }
  settings.transferDate = $('set-date').value;
  settings.embryoDay = Number($('set-embryo').value);
  try { localStorage.setItem('pt-settings', JSON.stringify(settings)); }
  catch { alert('⚠️ 브라우저 저장이 차단되어 있어요(사생활 보호 모드?). 이번 세션에서만 적용됩니다.'); }
  viewWeek = null;
  renderAll();
  alert('저장했어요! 주차가 다시 계산됩니다.');
}

/* ================= 탭 ================= */
document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    $('tab-' + btn.dataset.tab).classList.add('active');
    window.scrollTo(0,0);
  });
});

function renderAll() {
  renderHeader(); renderHome(); renderWeekTab();
  renderSchedule(); renderNutrition(); renderChecklist(); renderSettings();
}
renderAll();
</script>
